name: Monthly Dependency Refresh
'on':
  schedule:
    - cron: '11 7 22 * *'
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  refresh:
    uses: weirdapps/shared-workflows/.github/workflows/deps-refresh.yml@main
    with:
      node_version: '20'
      gate_cmd: npm test
    secrets: inherit
