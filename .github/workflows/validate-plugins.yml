name: Validate Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate marketplace.json
        run: |
          if [ ! -f ".claude-plugin/marketplace.json" ]; then
            echo "Error: marketplace.json not found"
            exit 1
          fi
          echo "marketplace.json found"
          cat .claude-plugin/marketplace.json | python3 -m json.tool

      - name: Validate plugin manifests
        run: |
          for dir in plugins/*/; do
            if [ -d "$dir" ]; then
              plugin_json="${dir}.claude-plugin/plugin.json"
              if [ ! -f "$plugin_json" ]; then
                echo "Error: Missing plugin.json in $dir"
                exit 1
              fi
              echo "Validating $plugin_json"
              cat "$plugin_json" | python3 -m json.tool
            fi
          done
          echo "All plugin manifests valid"
