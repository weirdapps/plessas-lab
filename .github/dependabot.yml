version: 2
updates:
  # GitHub Actions used by the validation workflow
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Root package.json (vitest test harness + shared tooling)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  # Each plugin keeps its own package.json; dependabot must be told about each one
  - package-ecosystem: npm
    directory: /plugins/manage-gmail/skills/manage-gmail/scripts
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /plugins/manage-nano-banana/skills/manage-nano-banana/tools
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /plugins/manage-youtube/skills/manage-youtube/tools
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /plugins/manage-youtube/skills/manage-youtube/tools/playlist-tools
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
