# SonarCloud configuration for Python projects
# Replace {ORG_KEY}, {PROJECT_KEY}, and {PROJECT_NAME} with your values

sonar.organization=weirdapps
sonar.projectKey=weirdapps_plessas-lab
sonar.projectName=plessas-lab

# Source code location
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Python-specific settings
sonar.python.version=3.11

# Coverage reports
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=\
  **/tests/**,\
  **/.venv/**,\
  **/venv/**,\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/.pytest_cache/**,\
  **/*.egg-info/**,\
  **/dist/**,\
  **/build/**,\
  **/mail-pro/**,\
  **/manage-gmail/skills/**/scripts/**,\
  **/manage-nano-banana/skills/**/scripts/**,\
  **/manage-youtube/skills/**/scripts/**

# Coverage exclusions — code that's analyzed for issues but excluded from coverage
# requirements (because it requires platform-specific runtime to exercise).
sonar.coverage.exclusions=\
  **/manage-apple-notes/skills/manage-apple-notes/scripts/list-notes.py,\
  **/manage-apple-notes/skills/manage-apple-notes/scripts/create-note.py,\
  **/manage-apple-notes/skills/manage-apple-notes/scripts/read-note.py,\
  **/manage-apple-notes/skills/manage-apple-notes/scripts/delete-note.py,\
  **/manage-apple-notes/skills/manage-apple-notes/scripts/attach-clipboard-image.py,\
  **/mail-pro/**,\
  **/manage-gmail/**,\
  **/manage-nano-banana/**,\
  **/manage-youtube/**

# Security exclusions — accept that osascript subprocess calls are intentional
# for the macOS-only manage-apple-notes plugin. The _platform.require_macos guard
# blocks all execution on non-Mac, so the subprocess pattern is safe here.
sonar.issue.ignore.multicriteria=apple-notes-osascript
sonar.issue.ignore.multicriteria.apple-notes-osascript.ruleKey=python:S4823
sonar.issue.ignore.multicriteria.apple-notes-osascript.resourceKey=**/manage-apple-notes/**

# Test exclusions
sonar.test.exclusions=\
  **/tests/**,\
  **/*_test.py,\
  **/test_*.py

# Test inclusions — explicitly tell SonarCloud where Python tests live so it can
# correctly attribute coverage. (testpaths in pyproject.toml only affects pytest
# discovery; SonarCloud needs its own pointer.)
sonar.tests=tests,plugins/chat-watch/tests,plugins/manage-apple-notes/tests
